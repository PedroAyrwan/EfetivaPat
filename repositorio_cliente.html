<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Meus Arquivos - EfetivaPat</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="style.css">

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#136dec" },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    
    <style>
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .animate-enter { animation: slideIn 0.3s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="font-display text-slate-900 dark:text-white h-screen overflow-hidden flex flex-col bg-slate-50 dark:bg-[#0f172a] relative">
    
    <div class="bg-dots"></div>
    <div class="blob blob-blue"></div>
    <div class="blob blob-purple"></div>

    <header class="h-20 glass flex items-center px-4 sm:px-8 z-20 shrink-0 sticky top-0">
        <div class="flex items-center gap-5">
            <a href="index.html" class="text-slate-400 hover:text-primary transition-colors group flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800" title="Voltar para Login">
                <span class="material-symbols-outlined text-2xl group-hover:-translate-x-1 transition-transform">arrow_back</span>
            </a>
            <div class="h-8 w-[1px] bg-slate-300 dark:bg-slate-700 hidden sm:block"></div>
            <div class="flex items-center gap-3">
                <div class="size-11 flex items-center justify-center">
                    <img src="imagem/logo.png" alt="Logo" class="w-full h-full object-contain">
                </div>
                <div class="flex flex-col justify-center">
                    <h2 class="text-slate-900 dark:text-white text-lg font-bold tracking-tight leading-none">EfetivaPat</h2>
                    <span class="text-[11px] uppercase font-bold text-primary tracking-widest mt-1">REPOSITÓRIO</span>
                </div>
            </div>
        </div>

        <div class="hidden md:flex flex-1 max-w-md mx-auto relative group ml-12">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-slate-400 group-focus-within:text-primary transition-colors">search</span>
            </div>
            <input type="text" id="searchDrive" placeholder="Pesquisar arquivos..." class="block w-full rounded-full border-slate-200 bg-slate-50/80 pl-10 pr-4 py-2 text-sm focus:ring-primary/20 focus:border-primary transition-all outline-none shadow-sm placeholder:text-slate-400">
        </div>

        <div class="ml-auto flex items-center gap-4">
            <div class="text-right hidden sm:block">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Bem vindo,</p>
                <p id="userName" class="text-sm font-bold text-slate-700 dark:text-slate-200 truncate max-w-[150px]">Carregando...</p>
            </div>
            <button id="btnProfileLogout" class="h-10 w-10 rounded-full bg-gradient-to-tr from-white to-slate-50 border border-slate-200 flex items-center justify-center text-slate-400 hover:text-red-500 hover:border-red-200 hover:bg-red-50 transition-all shadow-sm group" title="Sair do Sistema">
                <span class="material-symbols-outlined group-hover:hidden">person</span>
                <span class="material-symbols-outlined hidden group-hover:block">logout</span>
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative justify-center bg-transparent z-10">
        <main class="flex-1 flex flex-col min-w-0 max-w-6xl w-full h-full overflow-hidden">
            
            <div class="px-6 pt-8 pb-4 flex flex-col gap-1 sticky top-0 z-10 shrink-0">
                <div class="flex items-center justify-between">
                    <div>
                        <p id="pathBreadcrumb" class="text-sm text-slate-500 cursor-pointer hover:text-primary transition-colors font-medium mb-1" onclick="goHome()">Início</p>
                        <h1 class="text-3xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                            <span id="folderIconTitle" class="material-symbols-outlined text-yellow-500 text-3xl hidden">folder_open</span>
                            <span id="pageTitle">Meus Arquivos</span>
                        </h1>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <button onclick="window.location.reload()" class="bg-primary hover:bg-blue-600 text-white px-4 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 shadow-md shadow-blue-500/20 transition-all hover:scale-105 active:scale-95">
                            <span class="material-symbols-outlined text-[20px]">refresh</span>
                            <span class="hidden sm:inline">Atualizar</span>
                        </button>
                        
                        <button onclick="downloadAllFiles()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2.5 rounded-lg text-sm font-semibold flex items-center gap-2 shadow-md shadow-emerald-500/20 transition-all hover:scale-105 active:scale-95">
                            <span class="material-symbols-outlined text-[20px]">folder_zip</span>
                            <span class="hidden sm:inline">Baixar Tudo</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto px-6 pb-6 scroll-smooth">
                <div class="glass-card rounded-xl overflow-hidden min-h-[300px]">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-200/60 bg-slate-50/50">
                                <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider w-1/2">Nome</th>
                                <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider hidden sm:table-cell">Data</th>
                                <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider hidden md:table-cell">Tamanho</th>
                                <th class="py-4 px-6 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="filesListBody" class="divide-y divide-slate-100 dark:divide-slate-700/50">
                            </tbody>
                    </table>
                </div>
                <div class="h-24"></div> 
            </div>
        </main>
    </div>

    <div id="ai-widget-container" class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-4 pointer-events-none">
        <div id="chat-window" class="pointer-events-auto hidden w-[320px] sm:w-[350px] h-[450px] sm:h-[500px] glass-card rounded-2xl flex flex-col shadow-2xl overflow-hidden transition-all duration-300 transform origin-bottom-right scale-90 opacity-0 bg-white/95 dark:bg-slate-900/95">
            <div class="h-14 bg-gradient-to-r from-primary to-blue-600 flex items-center justify-between px-4 shrink-0">
                <div class="flex items-center gap-3">
                    <div class="p-1.5 bg-white/20 rounded-lg"><span class="material-symbols-outlined text-white text-lg">smart_toy</span></div>
                    <div><h3 class="text-white font-bold text-sm">Assistente IA</h3></div>
                </div>
                <button onclick="toggleChat()" class="text-white/80 hover:text-white"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50 dark:bg-slate-900/50">
                <div class="flex gap-2 items-start animate-enter">
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center shrink-0 text-primary"><span class="material-symbols-outlined text-sm">smart_toy</span></div>
                    <div class="bg-white p-3 rounded-2xl rounded-tl-none text-sm text-slate-700 border border-slate-100 shadow-sm">Olá! Sou sua IA. Posso ajudar a encontrar arquivos.</div>
                </div>
            </div>
            <div class="p-3 bg-white border-t border-slate-200 shrink-0">
                <form onsubmit="handleChatSubmit(event)" class="relative flex items-center gap-2">
                    <input type="text" id="chat-input" placeholder="Pergunte algo..." class="w-full bg-slate-100 text-slate-800 text-sm rounded-xl pl-4 pr-10 py-3 focus:ring-2 focus:ring-primary/50 border-none outline-none">
                    <button type="submit" class="absolute right-2 p-1.5 bg-primary text-white rounded-lg"><span class="material-symbols-outlined text-lg">send</span></button>
                </form>
            </div>
        </div>
        <button onclick="toggleChat()" id="chat-fab" class="pointer-events-auto h-14 w-14 rounded-full bg-gradient-to-r from-primary to-blue-600 text-white shadow-lg flex items-center justify-center z-50 hover:scale-110 transition-transform">
            <span class="material-symbols-outlined text-3xl">smart_toy</span>
        </button>
    </div>

    <script src="repositorio_client_logic.js"></script>

</body>
</html>
